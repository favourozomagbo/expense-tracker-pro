<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

    <header>

   <h1><i class="fa-solid fa-wallet"></i>Expense Tracker Pro</h1>

    <button id="darkModeBtn"><i class="fa-solid fa-moon"></i>Dark Mode</button>
</header>

<main class="container">

    <section class="dashboard">

        <div class="card">
    <i class="fa-solid fa-arrow-trend-up"></i>

    <h3>Total Income</h3>

    <h2 id="totalIncome">₦0</h2>
</div>

<div class="card">
    <i class="fa-solid fa-arrow-trend-down"></i>

    <h3>Total Expenses</h3>

    <h2 id="totalExpense">₦0</h2>
</div>

<div class="card">
    <i class="fa-solid fa-wallet"></i>

    <h3>Current Balance</h3>

    <h2 id="balance">₦0</h2>
</div>

<div class="card">
    <i class="fa-solid fa-receipt"></i>

    <h3>Total Transactions</h3>

    <h2 id="transactionCount">0</h2>
</div>
    </section>


    <section class="transaction-form">

    <h2>Add New Transaction</h2>

    <form id="expenseForm">

        <div class="form-group">

            <label for="title">Title</label>

            <input
        type="text"
        id="title"
        name="title"
        placeholder="Enter transaction title"
        required
    >
</div>

<div class="form-group">

    <label for="amount">Amount</label>

    <input
        type="number"
        id="amount"
        name="amount"
        placeholder="Enter amount"
        min="0"
        step="0.01"
        required
    >

</div>

<div class="form-group">

    <label for="category">Category</label>

    <select id="category" name="category" required>

        <option value="">Select Category</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Shopping">Shopping</option>
        <option value="Bills">Bills</option>
        <option value="Health">Health</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Salary">Salary</option>
        <option value="Other">Other</option>

    </select>

</div>

<div class="form-group">

    <label for="type">Transaction Type</label>

    <select id="type" name="type" required>

        <option value="">Select Type</option>
        <option value="Income">Income</option>
        <option value="Expense">Expense</option>

    </select>

</div>

<div class="form-group">

    <label for="date">Date</label>

    <input
        type="date"
        id="date"
        name="date"
        required
    >

</div>

<button type="submit" id="addTransactionBtn">

    <i class="fa-solid fa-plus"></i>Add Transaction

</button>

</form>

</section>

<section class="transactions">

    <div class="transaction-header">

        <h2>Transaction History</h2>

    <button id="exportBtn"><i class="fa-solid fa-file-export"></i>Export CSV</button>

    </div>

    <div class="table-controls">

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Search by title...">

        <select id="filterCategory">

            <option value="All">All Categories</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Health">Health</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Salary">Salary</option>
            <option value="Other">Other</option>

        </select>

        <select id="filterType">

            <option value="All">All Types</option>
            <option value="Income">Income</option>
            <option value="Expense">Expense</option>

        </select>

    </div>


    <table>
        <thead>

    <tr>
        <th>Title</th>
        <th>Amount</th>
        <th>Category</th>
        <th>Type</th>
        <th>Date</th>
        <th>Actions</th>

    </tr>

</thead>

<tbody id="transactionTable">

</tbody>
    </table>

</section>

</main>

<div id="notification" class="notification"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    
</body>
</html>
